<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seep King</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/home.css">

</head>

<body>

<div class="home">

    <!-- Top Bar -->

    <div class="top-bar">

        <div class="profile">

            <div class="avatar">
                👤
            </div>

            <div class="profile-info">

                <h2 id="playerName">Loading...</h2>

                <small>
                    ⭐ Level <span id="level">1</span>
                </small>

            </div>

        </div>

        <div class="coins">
            🪙 <span id="coins">0</span>
        </div>

    </div>

    <!-- Logo -->

    <div class="logo">

        ♠ SEEP KING ♠

    </div>

    <!-- Menu -->

    <div class="menu">

        <button class="menu-btn blue" id="singleGameBtn">

            <div class="menu-icon">
                🎮
            </div>

            <div>

                <h3>Single Game</h3>

                <p>Play against online players</p>

            </div>

        </button>

        <button class="menu-btn purple" id="friendsBtn">

            <div class="menu-icon">
                👥
            </div>

            <div>

                <h3>Play With Friends</h3>

                <p>Create or Join Private Room</p>

            </div>

        </button>

        <button class="menu-btn green" id="profileBtn">

            <div class="menu-icon">
                👤
            </div>

            <div>

                <h3>Profile</h3>

                <p>Statistics & Achievements</p>

            </div>

        </button>

        <button class="menu-btn red" id="logoutBtn">

            <div class="menu-icon">
                🚪
            </div>

            <div>

                <h3>Logout</h3>

                <p>Sign out</p>

            </div>

        </button>

    </div>

    <!-- Version -->

    <div class="bottom-bar">

        Version 1.0.0

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/home.js"></script>

</body>
</html>
