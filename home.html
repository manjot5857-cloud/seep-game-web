<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Seep King</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="css/game.css">

</head>

<body>

<div class="game-container">

    <!-- ===================================== -->
    <!-- Top Bar -->
    <!-- ===================================== -->

    <div class="top-bar">

        <div class="score-box">

            ⭐

            <span id="team1Score">

                0

            </span>

            -

            <span id="team2Score">

                0

            </span>

        </div>

        <div class="prize-box">

            🪙 Prize

            <span id="prizePool">

                0

            </span>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- Top Player -->
    <!-- ===================================== -->

    <div class="player top-player">

        <div class="avatar">

            👤

        </div>

        <div class="player-name"
             id="player3Name">

            Waiting...

        </div>

        <div class="player-points">

            ⭐ <span id="player3Points">0</span>

        </div>

        <div class="dealer"
             id="player3Dealer">

            🃏

        </div>

    </div>

    <!-- ===================================== -->
    <!-- Middle -->
    <!-- ===================================== -->

    <div class="middle-area">

        <!-- Left -->

        <div
            class="player side-player"
            id="leftPlayer">

            <div class="avatar">

                👤

            </div>

            <div
                class="player-name"
                id="player2Name">

                Waiting...

            </div>

            <div>

                ⭐ <span id="player2Points">

                    0

                </span>

            </div>

            <div
                class="dealer"
                id="player2Dealer">

                🃏

            </div>

        </div>

        <!-- Table -->

        <div class="table">

            <h2>

                Table

            </h2>

            <div
                id="tableCards"
                class="table-cards">

            </div>

        </div>

        <!-- Right -->

        <div
            class="player side-player"
            id="rightPlayer">

            <div class="avatar">

                👤

            </div>

            <div
                class="player-name"
                id="player4Name">

                Waiting...

            </div>

            <div>

                ⭐ <span id="player4Points">

                    0

                </span>

            </div>

            <div
                class="dealer"
                id="player4Dealer">

                🃏

            </div>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- Bottom Player -->
    <!-- ===================================== -->

    <div class="player bottom-player">

        <div class="avatar">

            👤

        </div>

        <div
            class="player-name"
            id="player1Name">

            You

        </div>

        <div>

            ⭐ <span id="player1Points">

                0

            </span>

        </div>

        <div
            class="dealer"
            id="player1Dealer">

            🃏

        </div>

    </div>

    <!-- ===================================== -->
    <!-- My Cards -->
    <!-- ===================================== -->

    <div
        id="myCards"
        class="my-cards">

    </div>

    <!-- ===================================== -->
    <!-- Bottom Buttons -->
    <!-- ===================================== -->

    <div class="bottom-buttons">

        <button
            id="leaveGameBtn"
            class="leave-btn">

            🚪 Leave Game

        </button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/game.js"></script>

</body>

</html>
