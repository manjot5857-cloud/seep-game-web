<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Seep King</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/home.css">
     <link rel="stylesheet" href="css/theme.css">

</head>

<body>

<div class="home-container">

    <div class="card">

        <!-- Header -->

        <h1>

            🃏 Seep King

        </h1>

        <h2>

            Welcome,
            <span id="playerName">Player</span>

        </h2>

        <!-- Coins -->

        <div class="player-card">

            <div>

                <h3>Available Coins</h3>

                <span id="coins">

                    0

                </span>

            </div>

            <div class="coin-icon">

                🪙

            </div>

        </div>

        <!-- Menu -->

        <button
            id="singleGameBtn">

            🎮 Single Game

        </button>

        <button
            id="friendsBtn">

            👥 Play With Friends

        </button>

        <button
            disabled>

            🏆 Leaderboard (Coming Soon)

        </button>

        <button
            disabled>

            👤 Profile (Coming Soon)

        </button>

        <button
            id="logoutBtn"
            class="logout-btn">

            🚪 Logout

        </button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/home.js"></script>

</body>

</html>
