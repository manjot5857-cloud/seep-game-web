<div class="game-page">

    <div class="header">

        <button class="back-btn" onclick="window.location='home.html'">
            ←
        </button>

        <h1>Single Game</h1>

        <div></div>

    </div>

    <div class="player-card">

        <div>
            <h3>Available Coins</h3>
            <span id="coins">0</span>
        </div>

        <div class="coin-icon">
            🪙
        </div>

    </div>

    <h2 class="section-title">
        Choose Table
    </h2>

    <div class="coin-grid">

        <div class="coin-card selected bronze" data-coins="100">
            <span class="table-name">Bronze</span>
            <h2>100</h2>
            <small>Entry Fee</small>
        </div>

        <div class="coin-card bronze" data-coins="200">
            <span class="table-name">Bronze+</span>
            <h2>200</h2>
            <small>Entry Fee</small>
        </div>

        <div class="coin-card silver" data-coins="500">
            <span class="table-name">Silver</span>
            <h2>500</h2>
            <small>Entry Fee</small>
        </div>

        <div class="coin-card silver" data-coins="1000">
            <span class="table-name">Silver+</span>
            <h2>1,000</h2>
            <small>Entry Fee</small>
        </div>

        <div class="coin-card gold" data-coins="2500">
            <span class="table-name">Gold</span>
            <h2>2,500</h2>
            <small>Entry Fee</small>
        </div>

        <div class="coin-card gold" data-coins="5000">
            <span class="table-name">Gold+</span>
            <h2>5,000</h2>
            <small>Entry Fee</small>
        </div>

        <div class="coin-card diamond" data-coins="10000">
            <span class="table-name">Diamond</span>
            <h2>10,000</h2>
            <small>Entry Fee</small>
        </div>

    </div>

    <h2 class="section-title">
        Game Mode
    </h2>

    <div class="mode-buttons">

        <button class="mode active" data-mode="1">
            👤
            <span>1 vs 1</span>
        </button>

        <button class="mode" data-mode="2">
            👥
            <span>2 vs 2</span>
        </button>

    </div>

    <button id="playNowBtn" class="play-btn">
        ▶ PLAY NOW
    </button>

</div>
