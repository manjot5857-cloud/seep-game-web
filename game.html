<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Seep King</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/game.css">

</head>

<body>

<div class="game-container">

    <div class="top-bar">

        <div>

            Room:
            <span id="roomCode">
                ------
            </span>

        </div>

        <div>

            Coins:
            <span id="coins">
                0
            </span>

        </div>

    </div>

    <div class="opponents">

        <div class="player">

            <div class="avatar">
                👤
            </div>

            <div id="player2">
                Waiting...
            </div>

            <div class="hand">
                🂠🂠🂠🂠
            </div>

        </div>

        <div class="player" id="player3Box">

            <div class="avatar">
                👤
            </div>

            <div id="player3">
                Waiting...
            </div>

            <div class="hand">
                🂠🂠🂠🂠
            </div>

        </div>

        <div class="player" id="player4Box">

            <div class="avatar">
                👤
            </div>

            <div id="player4">
                Waiting...
            </div>

            <div class="hand">
                🂠🂠🂠🂠
            </div>

        </div>

    </div>

    <div class="table-area">

        <h2>

            Table

        </h2>

        <div id="tableCards"
        class="table-cards">

        </div>

    </div>

    <div class="your-hand">

        <h2>

            Your Hand

        </h2>

        <div
        id="myCards"
        class="cards">

        </div>

    </div>

    <div class="bottom">

        <button
        id="endTurnBtn">

            End Turn

        </button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/game.js"></script>

</body>

</html>
