<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Single Game - Seep King</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="game-page">

    <!-- Header -->

    <div class="top-bar">

        <button class="back-btn" onclick="window.location='home.html'">
            ← Back
        </button>

        <div class="coins-display">

            🪙 <span id="coins">0</span>

        </div>

    </div>

    <h1>Select Game</h1>

    <p class="subtitle">

        Choose your entry fee

    </p>

    <!-- Coin Tables -->

    <div class="coin-grid">

        <div class="coin-card selected" data-coins="100">
            <h2>100</h2>
            <p>Entry Fee</p>
        </div>

        <div class="coin-card" data-coins="200">
            <h2>200</h2>
            <p>Entry Fee</p>
        </div>

        <div class="coin-card" data-coins="500">
            <h2>500</h2>
            <p>Entry Fee</p>
        </div>

        <div class="coin-card" data-coins="1000">
            <h2>1,000</h2>
            <p>Entry Fee</p>
        </div>

        <div class="coin-card" data-coins="2500">
            <h2>2,500</h2>
            <p>Entry Fee</p>
        </div>

        <div class="coin-card" data-coins="5000">
            <h2>5,000</h2>
            <p>Entry Fee</p>
        </div>

        <div class="coin-card" data-coins="10000">
            <h2>10,000</h2>
            <p>Entry Fee</p>
        </div>

    </div>

    <h2 class="mode-title">

        Select Mode

    </h2>

    <div class="mode-buttons">

        <button class="mode active" data-mode="1">

            👤 1 vs 1

        </button>

        <button class="mode" data-mode="2">

            👥 2 vs 2

        </button>

    </div>

    <button id="playNowBtn" class="play-btn">

        PLAY NOW

    </button>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/single-game.js"></script>

</body>

</html>
