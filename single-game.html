<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Seep King - Single Match</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/single-game.css">

</head>

<body>

<div class="page">

    <div class="panel">

        <!-- Header -->

        <div class="header">

            <button
                class="back-btn"
                onclick="window.location='home.html'">

                ←

            </button>

            <h1>

                🎮 Single Match

            </h1>

            <button
                id="logoutBtn"
                class="logout-btn">

                Logout

            </button>

        </div>

        <!-- Coins -->

        <div class="coins-card">

            <div>

                <small>Available Balance</small>

                <h2>

                    🪙
                    <span id="coins">
                        0
                    </span>

                </h2>

            </div>

            <div class="coin-icon">

                💰

            </div>

        </div>

        <!-- Table Selection -->

        <div class="section">

            <h2>

                Choose Your Table

            </h2>

            <div class="coin-grid">

                <div
                    class="coin-card bronze selected"
                    data-coins="100">

                    <div class="table-title">

                        🥉 Bronze

                    </div>

                    <div class="entry">

                        Entry Fee

                    </div>

                    <div class="coins">

                        🪙 100

                    </div>

                </div>

                <div
                    class="coin-card silver"
                    data-coins="500">

                    <div class="table-title">

                        ⚪ Silver

                    </div>

                    <div class="entry">

                        Entry Fee

                    </div>

                    <div class="coins">

                        🪙 500

                    </div>

                </div>

                <div
                    class="coin-card gold"
                    data-coins="2500">

                    <div class="table-title">

                        🥇 Gold

                    </div>

                    <div class="entry">

                        Entry Fee

                    </div>

                    <div class="coins">

                        🪙 2,500

                    </div>

                </div>

                <div
                    class="coin-card platinum"
                    data-coins="5000">

                    <div class="table-title">

                        👑 Platinum

                    </div>

                    <div class="entry">

                        Entry Fee

                    </div>

                    <div class="coins">

                        🪙 5,000

                    </div>

                </div>

                <div
                    class="coin-card diamond"
                    data-coins="10000">

                    <div class="table-title">

                        💎 Diamond

                    </div>

                    <div class="entry">

                        Entry Fee

                    </div>

                    <div class="coins">

                        🪙 10,000

                    </div>

                </div>

            </div>

        </div>

        <!-- Game Mode -->

        <div class="section">

            <h2>

                Game Mode

            </h2>

            <div class="mode-buttons">

                <button
                    class="mode active"
                    data-mode="1">

                    👤
                    <br>
                    1 vs 1

                </button>

                <button
                    class="mode"
                    data-mode="2">

                    👥
                    <br>
                    2 vs 2

                </button>

            </div>

        </div>

        <!-- Play -->

        <button
            id="playNowBtn"
            class="play-btn">

            ▶ PLAY NOW

        </button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/single-game.js"></script>

</body>

</html>
