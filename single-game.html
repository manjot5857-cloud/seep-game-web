<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Single Match</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/single-game.css">

</head>

<body>

<div class="page">

    <div class="panel">

        <div class="header">

            <button class="back-btn"
                onclick="window.location='home.html'">

                ←

            </button>

            <h1>

                🎮 Single Match

            </h1>

            <button id="logoutBtn"
                class="logout-btn">

                Logout

            </button>

        </div>

        <div class="coins-card">

            <div>

                <small>Your Coins</small>

                <h2 id="coins">0</h2>

            </div>

            <div class="coin-icon">

                🪙

            </div>

        </div>

        <div class="section">

            <h2>Select Table</h2>

            <div class="coin-grid">

                <div class="coin-card selected bronze" data-coins="100">

                    Bronze

                    <strong>100</strong>

                </div>

                <div class="coin-card bronze" data-coins="200">

                    Bronze+

                    <strong>200</strong>

                </div>

                <div class="coin-card silver" data-coins="500">

                    Silver

                    <strong>500</strong>

                </div>

                <div class="coin-card silver" data-coins="1000">

                    Silver+

                    <strong>1,000</strong>

                </div>

                <div class="coin-card gold" data-coins="2500">

                    Gold

                    <strong>2,500</strong>

                </div>

                <div class="coin-card gold" data-coins="5000">

                    Gold+

                    <strong>5,000</strong>

                </div>

                <div class="coin-card diamond" data-coins="10000">

                    Diamond

                    <strong>10,000</strong>

                </div>

            </div>

        </div>

        <div class="section">

            <h2>Game Mode</h2>

            <div class="mode-buttons">

                <button class="mode active" data-mode="1">

                    👤 1 vs 1

                </button>

                <button class="mode" data-mode="2">

                    👥 2 vs 2

                </button>

            </div>

        </div>

        <button
            id="playNowBtn"
            class="play-btn">

            ▶ PLAY NOW

        </button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/single-game.js"></script>

</body>

</html>
